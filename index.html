<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🃏 Card Cycle Simulator Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a; color: #e0e0e0; padding: 20px; line-height: 1.6;
        }
.container { max-width: 900px; margin: 0 auto; }
        .card {
            background: #161616; padding: 25px; border-radius: 12px;
            border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        h1 { font-size: 26px; color: #fff; margin-bottom: 5px; font-weight: 700; }
        p.sub { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 400; }

        .controls {
            display: flex; gap: 12px; background: #1e1e1e; padding: 20px;
            border-radius: 10px; align-items: center; flex-wrap: wrap;
        }
        input {
            background: #0a0a0a; border: 1px solid #444; color: #fff;
            padding: 12px; border-radius: 8px; font-size: 16px; flex: 1; min-width: 120px;
        }
        button {
            padding: 12px 24px; background: #4f46e5; color: #fff;
            border: none; border-radius: 8px; cursor: pointer; font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        button:hover { background: #4338ca; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #333; cursor: not-allowed; opacity: 0.7; }

        .secondary-btn { background: #2d2d2d; border: 1px solid #444; }
        .secondary-btn:hover { background: #3d3d3d; }

        .tabs { display: flex; border-bottom: 1px solid #333; margin: 20px 0; align-items: center; }
        .tab {
            padding: 12px 25px; cursor: pointer; color: #888;
            border-bottom: 2px solid transparent; transition: 0.3s;
        }
        .tab.active { color: #a5b4fc; border-bottom-color: #4f46e5; font-weight: bold; }
        
        .copy-btn {
            margin-left: auto; background: transparent; border: 1px solid #444;
            padding: 6px 12px; font-size: 12px; border-radius: 6px; color: #a5b4fc;
        }

        #displayArea { min-height: 250px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-family: 'JetBrains Mono', monospace; }
        th { text-align: left; color: #888; border-bottom: 1px solid #333; padding: 12px; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #1e1e1e; font-size: 14px; }
        .res-highlight { color: #a5b4fc; font-weight: 700; font-size: 32px; margin-top: 10px; font-family: 'JetBrains Mono', monospace; }

        #chartCanvas { width: 100% !important; height: 350px !important; background: #111; border-radius: 10px; padding: 10px; }
        .progress-bar-container { width: 100%; background: #111; height: 4px; border-radius: 2px; margin-top: 15px; display: none; }
        #progress { width: 0%; height: 100%; background: #4f46e5; border-radius: 2px; transition: width 0.1s; }
        
        #status { font-size: 12px; margin-top: 10px; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🃏 Card Cycle Simulator <small style="color: #666; font-weight: normal;">(A395069 <a href="cardpresentation.html" style="color: #4f46e5;">Presentation</a>)</small></h1>

        <div class="controls">
            <input type="number" id="inputValue" value="20" min="1">
            <button id="btnSingle">Calculate Single</button>
            <button id="btnRange" class="secondary-btn">Simulate 1 to N</button>
        </div>
        <div class="progress-bar-container" id="progCont">
            <div id="progress"></div>
        </div>
        <div id="status">Ready.</div>
    </div>

    <div class="tabs" id="tabBar" style="display:none">
        <div class="tab active" id="tabTable">Data Table</div>
        <div class="tab" id="tabChart">Growth Chart</div>
        <button class="copy-btn" id="btnCopy">📋 Copy Sequence</button>
    </div>

    <div id="displayArea" class="card" style="display:none">
        <div id="tableContent"></div>
        <div id="chartContent" style="display:none">
            <canvas id="chartCanvas"></canvas>
        </div>
    </div>
</div>

<script>
    let results = [];
    let isRunning = false;

    // --- CORE LOGIC (DO NOT MODIFY) ---
    function simulate(n) {
        let deck = [];
        for (let i = 0; i < n; i++) deck.push({ f: 1, id: i });
        let moves = 0, step = 1, MAX = 10000000;
        
        while (moves < MAX) {
            let packet = deck.splice(0, step);
            packet.reverse();
            for (let j = 0; j < packet.length; j++) packet[j].f = 1 - packet[j].f;
            deck = packet.concat(deck);
            moves++;

            let match = true;
            for (let i = 0; i < n; i++) {
                if (deck[i].f !== 1 || deck[i].id !== i) { match = false; break; }
            }
            if (match) return moves;
            step = (step % n) + 1;
        }
        return -1; 
    }

    const btnS = document.getElementById('btnSingle');
    const btnR = document.getElementById('btnRange');
    const btnCopy = document.getElementById('btnCopy');
    const input = document.getElementById('inputValue');
    const status = document.getElementById('status');
    const progress = document.getElementById('progress');
    const progCont = document.getElementById('progCont');
    const display = document.getElementById('displayArea');
    const tableDiv = document.getElementById('tableContent');

    // Single Calculation
    btnS.onclick = async () => {
        const n = parseInt(input.value);
        if (isNaN(n) || n < 1) return;
        
        status.textContent = "Processing...";
        display.style.display = 'block';
        document.getElementById('tabBar').style.display = 'none';
        tableDiv.innerHTML = "Computing result...";
        
        await new Promise(r => setTimeout(r, 50));
        const res = simulate(n);
        
        tableDiv.innerHTML = `
            <div style="text-align:center; padding: 40px 20px;">
                <p style="color:#888; font-size: 14px;">Total moves for <b>${n}</b> cards:</p>
                <p class="res-highlight">${res === -1 ? "Timeout (>10M)" : res.toLocaleString()}</p>
            </div>`;
        status.textContent = "Calculation complete.";
    };

    // Range Simulation
    btnR.onclick = async () => {
        const maxN = parseInt(input.value);
        if (isNaN(maxN) || maxN < 1 || isRunning) return;
        
        isRunning = true;
        results = [];
        display.style.display = 'block';
        document.getElementById('tabBar').style.display = 'flex';
        progCont.style.display = 'block';
        tableDiv.innerHTML = "";
        
        for (let i = 1; i <= maxN; i++) {
            status.textContent = `Computing n = ${i} of ${maxN}`;
            progress.style.width = (i / maxN * 100) + "%";
            await new Promise(r => setTimeout(r, 0));
            results.push({ n: i, m: simulate(i) });
        }
        
        renderTable();
        isRunning = false;
        status.textContent = "Simulation complete.";
        progCont.style.display = 'none';
        progress.style.width = "0%";
    };

function renderTable() {
    // Intestazione con link ai siti OEIS
    let html = '<table><tr>' +
               '<th>Cards (n)</th>' +
               '<th><a href="https://oeis.org/A002326" target="_blank" style="color: #888; text-decoration: underline;">Cycles (m/n)</a></th>' +
               '<th><a href="https://oeis.org/A395069" target="_blank" style="color: #888; text-decoration: underline;">Total Moves</a></th>' +
               '</tr>';
    
    results.forEach(r => {
        const cycles = r.m === -1 ? "-" : (r.m / r.n);
        
        html += `<tr>
            <td>${r.n}</td>
            <td>${cycles}</td>
            <td>${r.m === -1 ? "Timeout" : r.m.toLocaleString()}</td>
        </tr>`;
    });
    
    html += '</table>';
    tableDiv.innerHTML = html;
    showTab('table');
}

    // Copy to Clipboard
    btnCopy.onclick = () => {
        if (results.length === 0) return;
        const sequence = results.map(r => r.m).join(', ');
        navigator.clipboard.writeText(sequence).then(() => {
            const originalText = btnCopy.innerHTML;
            btnCopy.innerHTML = "✅ Copied!";
            setTimeout(() => btnCopy.innerHTML = originalText, 2000);
        });
    };

    // Tabs & Chart
    document.getElementById('tabTable').onclick = () => showTab('table');
    document.getElementById('tabChart').onclick = () => showTab('chart');

    function showTab(type) {
        document.getElementById('tabTable').className = 'tab ' + (type === 'table' ? 'active' : '');
        document.getElementById('tabChart').className = 'tab ' + (type === 'chart' ? 'active' : '');
        tableDiv.style.display = type === 'table' ? 'block' : 'none';
        document.getElementById('chartContent').style.display = type === 'chart' ? 'block' : 'none';
        if (type === 'chart') drawChart();
    }

    function drawChart() {
        const canvas = document.getElementById('chartCanvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;
        canvas.width = w; canvas.height = h;

        const validResults = results.filter(r => r.m !== -1);
        if (validResults.length < 2) return;

        const maxY = Math.max(...validResults.map(r => r.m));
        const pad = 50;

        // Draw simple axes
        ctx.strokeStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(pad, pad); ctx.lineTo(pad, h - pad); ctx.lineTo(w - pad, h - pad);
        ctx.stroke();

        // Draw Line
        ctx.strokeStyle = '#4f46e5';
        ctx.lineWidth = 2;
        ctx.beginPath();
        validResults.forEach((r, i) => {
            const x = pad + (i / (validResults.length - 1)) * (w - pad * 2);
            const y = (h - pad) - (r.m / maxY) * (h - pad * 2);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }
</script>

</body>
</html>
